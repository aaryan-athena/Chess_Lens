<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#111827"/>
  <!-- Outer lens ring -->
  <circle cx="256" cy="256" r="180" stroke="white" stroke-width="28" fill="none"/>
  <!-- Inner lens ring -->
  <circle cx="256" cy="256" r="110" stroke="white" stroke-width="20" fill="none"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="36" fill="white"/>
  <!-- Cross top -->
  <line x1="256" y1="56" x2="256" y2="120" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Cross bottom -->
  <line x1="256" y1="392" x2="256" y2="456" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Cross left -->
  <line x1="56" y1="256" x2="120" y2="256" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Cross right -->
  <line x1="392" y1="256" x2="456" y2="256" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Camera notch top -->
  <rect x="196" y="44" width="120" height="44" rx="22" fill="white"/>
</svg>
